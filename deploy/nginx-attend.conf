# ============================================================
#  NFC 학생 출석 — kfcman.link/attend 서브경로 배포용 Nginx 설정
#  기존 kfcman.link 서버 블록(server { server_name kfcman.link ...; }) "안에" 아래 두 블록을 추가하세요.
#  (별도 server 블록이 아니라, 기존 블록 내부 location 들과 같은 레벨에 넣습니다.)
#  TLS 인증서는 kfcman.link 것이 그대로 적용되므로 추가 certbot 발급이 필요 없습니다.
# ============================================================

# 트레일링 슬래시 강제 — /attend 로 들어오면 /attend/ 로 보정(상대 자산 경로 정상화)
location = /attend {
    return 301 /attend/;
}

# 실제 프록시. '^~' 는 정적 자산 정규식 location(.js/.css 등)보다 우선 적용되도록 함(기존 /on 과 동일 이유).
location ^~ /attend/ {
    # --- 기본 인증(비밀번호)로 사이트 전체 보호 ---
    auth_basic           "출석 시스템 (관계자 전용)";
    auth_basic_user_file /etc/nginx/.htpasswd-attend;

    # 끝의 '/' 가 핵심: 요청 경로에서 '/attend/' 접두어를 떼고 내부 서버로 전달
    #   브라우저 /attend/api/today-info  →  내부 127.0.0.1:3100/api/today-info
    proxy_pass         http://127.0.0.1:3100/;
    proxy_http_version 1.1;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # SSE(/attend/api/events) 실시간 스트림 — 버퍼링 끄고 타임아웃 길게
    proxy_set_header Connection "";
    proxy_buffering off;
    proxy_cache     off;
    proxy_read_timeout 3600s;
}
